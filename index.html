<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Francesco Biscaccia Carrara</title>
  </head>

  <body>
    <div class="main_div" id="div_main">
      <div class="propic_div" id="div_propic">
        <img class="propic" src="./img/propic.jpg" />
        <h1>Francesco Biscaccia Carrara</h1>
      </div>

      <h1 class="typewriter_text" id="quote"></h1>
      <div class="links_div" id="div_links">
        <a
          href="https://twitter.com/i/flow/login?redirect_after_login=%2Fbiscaccia"
          ><img class="link" src="./img/x_icon.svg"
        /></a>
        <a href="https://medium.com/@francescobiscaccia"
          ><img class="link" src="./img/medium_icon.svg"
        /></a>
        <img class="link" src="./img/docs_icon.svg" onclick="show_file()" />
      </div>
    </div>
    <div class="file_div" id="div_file">
      <img src="./img/back_icon.png" class="back_icon" onclick="hide_file()" />
      <h1>My files</h1>

      <hr class="sep">
      <h2>2022-2023</h2>
      <a href="https://ricksrick.github.io/multimedia.html" class="file_txt" target="_blank"
        ><h3>
          <img src="./img/link_icon.svg" class="file_icon" />Quiz Multimedia UniPD
        </h3></a
      >
      <a href="https://ricksrick.github.io/index.html" class="file_txt" target="_blank"
        ><h3>
          <img src="./img/link_icon.svg" class="file_icon" />Quiz Basi di Dati UniPD
        </h3></a
      >
      <hr class="sep">
      <h2>2023-2024</h2>
      <a href="./docs/ml_2324.pdf" class="file_txt" target="_blank"
        ><h3>
          <img src="./img/file_icon.svg" class="file_icon" />Machine Learning
          Course: Notes
        </h3></a
      >
      <a href="./docs/or_2324.pdf" class="file_txt" target="_blank"
        ><h3>
          <img src="./img/file_icon.svg" class="file_icon" />Operation Research
          Course: Notes
        </h3></a
      >

      <a href="https://github.com/Francesco-Biscaccia/automata-obsidian" class="file_txt" target="_blank"
        ><h3>
          <img src="./img/file_icon.svg" class="file_icon" />Automata, Languages and Computation
          Course: Notes (Obsidian format)
        </h3></a
      >
      
    </div>
    <script>
      function show_file() {
        document.getElementById("div_main").className = "main_div_hide";
        document.getElementById("div_file").className = "file_div_show";
        document.getElementById("div_file").style.display = "block";
        document.getElementById("div_main").style.display = "none";
      }

      function hide_file() {
        document.getElementById("div_file").className = "file_div_hide";
        document.getElementById("div_file").style.display = "none";
        document.getElementById("div_main").className = "main_div_show";
        document.getElementById("div_main").style.display = "block";
        document.getElementById("quote").className = "typewriter_text_no_anim";
        document.getElementById("div_propic").className = "propic_div_no_anim";
        document.getElementById("div_links").className = "links_div_no_anim";
      }

      const quotes = ["Less is more", "Do it or retry", "Never regret"];

      document.getElementById("quote").innerHTML =
        quotes[Math.floor(Math.random() * quotes.length)];
    </script>
  </body>
</html>
